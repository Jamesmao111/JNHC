<!DOCTYPE HTML>
<html>
    <head>
        <title>Voices - Edward Bernays</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="assets/css/main.css" />
        <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
        
        <style>
            /* Edward Bernays Institutional / Monochrome Typography Styles */
            body {
                background-color: #111111;
                font-family: 'Georgia', 'Times New Roman', serif;
            }

            /* Propaganda Splash Screen Animation */
            #splash-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: #f4f1ea; /* Aged vintage document paper tone */
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                animation: fadeOut 1.5s ease-in-out 3.5s forwards;
                border: 20px solid #111;
                box-sizing: border-box;
            }

            /* The Bernays Eye of Public Perception */
            .bernays-eye {
                width: 120px;
                height: 60px;
                background: transparent;
                border: 4px solid #111;
                border-radius: 50% 50%;
                position: relative;
                margin-bottom: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }
            .bernays-eye::before {
                content: '';
                width: 40px;
                height: 40px;
                background: #111;
                border-radius: 50%;
                position: absolute;
                animation: scan 2.5s ease-in-out infinite;
            }

            #splash-screen h1 {
                font-family: 'Arial Black', Impact, sans-serif;
                color: #111;
                font-size: 2.8rem;
                letter-spacing: -1px;
                text-transform: uppercase;
                margin: 0;
                text-align: center;
                line-height: 1.1;
                animation: fadeIn 1s ease-in;
            }

            #splash-screen p {
                font-family: 'Courier New', Courier, monospace;
                color: #555555; /* Neutral dark gray instead of red */
                font-weight: bold;
                letter-spacing: 2px;
                font-size: 1rem;
                margin-top: 15px;
                text-transform: uppercase;
                animation: fadeIn 1.5s ease-in;
            }

            /* Keyframes for Animation Engine */
            @keyframes scan {
                0% { transform: translateX(-20px); }
                50% { transform: translateX(20px); }
                100% { transform: translateX(-20px); }
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            @keyframes fadeOut {
                to { opacity: 0; visibility: hidden; }
            }

            /* Main Page - Intelligence Document Aesthetic */
            #wrapper {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 4rem 2rem;
                text-align: center;
                box-sizing: border-box;
                background: #fcfbf7; /* Aged cream paper background */
                color: #111;
                max-width: 960px;
                margin: 0 auto;
                box-shadow: 0 0 40px rgba(0,0,0,0.6);
                border-left: 1px solid #ddd;
                border-right: 1px solid #ddd;
            }

            .classification-tag {
                font-family: 'Courier New', Courier, monospace;
                color: #111111;
                font-weight: bold;
                letter-spacing: 4px;
                text-transform: uppercase;
                font-size: 0.95rem;
                margin-bottom: 2rem;
                border: 2px dashed #111111;
                padding: 6px 15px;
                display: inline-block;
            }

            .main-header h1 {
                font-family: 'Arial Black', Impact, sans-serif;
                font-size: 3.8rem;
                color: #111;
                margin-bottom: 1.5rem;
                text-transform: uppercase;
                letter-spacing: -1px;
                line-height: 1;
                border-bottom: 4px double #111;
                padding-bottom: 20px;
                width: 100%;
            }

            .intro-text {
                font-size: 1.35rem;
                color: #222;
                max-width: 680px;
                margin: 0 auto 4rem auto;
                line-height: 1.8;
                font-family: 'Georgia', serif;
                font-style: italic;
            }

            /* Corporate News/PR Button Styling - Crisp Black & White */
            .actions.custom-actions {
                display: flex;
                gap: 25px;
                justify-content: center;
                flex-wrap: wrap;
                width: 100%;
                max-width: 750px;
                margin: 0 auto;
            }

            .actions.custom-actions li {
                flex: 1;
                min-width: 280px;
            }

            .actions.custom-actions a.button.primary {
                background-color: #111111 !important;
                color: #ffffff !important;
                border-radius: 0px; /* Sharp, rigid institutional corners */
                font-family: 'Courier New', Courier, monospace;
                font-weight: bold;
                font-size: 1.1rem;
                letter-spacing: 1px;
                text-transform: uppercase;
                box-shadow: none;
                border: 2px solid #111;
                padding: 0.75rem 0;
                transition: all 0.2s ease-in-out;
            }

            /* Pure inverted high-contrast shift on hover (No Red) */
            .actions.custom-actions a.button.primary:hover {
                background-color: transparent !important;
                color: #111111 !important;
                transform: none;
                box-shadow: inset 0 0 0 2px #111;
            }
        </style>
    </head>
    <body class="is-preload">

        <div id="splash-screen">
            <div class="bernays-eye"></div>
            <h1>The Engineering<br>of Consent</h1>
            <p>Voices - Edward Bernays</p>
        </div>

        <div id="wrapper">


            <header class="main-header">
				<h1 style="color:white">Voices-Edwrad Bernays</h1>
            </header>

            <p class="intro-text">
                Step foot into the world of manipulation.
            </p>

            <ul class="actions custom-actions fit">
                <li><a href="modified.html" class="button">Teacher</a></li>
                <li><a href="main.html" class="button">Judge</a></li>
            </ul>

        </div>

        <script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/jquery.scrollex.min.js"></script>
        <script src="assets/js/jquery.scrolly.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script src="assets/js/main.js"></script>
        
        <script>
            window.addEventListener('load', function() {
                setTimeout(function() {
                    var splash = document.getElementById('splash-screen');
                    if (splash) {
                        splash.style.display = 'none';
                    }
                }, 5000); // 3.5s delay + 1.5s fadeOut animation execution time
            });
        </script>

    </body>
</html>
